                        </div>
                    </div>
                `;
            }
        };

        // ==================== 차트 ====================
        const Charts = {
            drawDonut(canvasId, legendId, data, colors) {
                const canvas = document.getElementById(canvasId);
                const legend = document.getElementById(legendId);
                if (!canvas || !legend) return;

                const ctx = canvas.getContext('2d');
                const total = data.reduce((sum, d) => sum + d.value, 0);
                
                if (total === 0) {
                    ctx.fillStyle = '#ddd';
                    ctx.beginPath();
                    ctx.arc(100, 100, 80, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath();
                    ctx.arc(100, 100, 40, 0, Math.PI * 2);
                    ctx.fill();
                    legend.innerHTML = '<p style="color:#999">데이터 없음</p>';
                    return;
                }

                let startAngle = -Math.PI / 2;
                
                data.forEach((d, i) => {
                    const sliceAngle = (d.value / total) * Math.PI * 2;
                    ctx.fillStyle = colors[i % colors.length];
                    ctx.beginPath();
                    ctx.moveTo(100, 100);
                    ctx.arc(100, 100, 80, startAngle, startAngle + sliceAngle);
                    ctx.closePath();
                    ctx.fill();
                    startAngle += sliceAngle;
                });

                // 가운데 원 (도넛)
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(100, 100, 40, 0, Math.PI * 2);
                ctx.fill();

                // 범례
                legend.innerHTML = data.map((d, i) => `
                    <div class="legend-item">
                        <div class="legend-color" style="background:${colors[i % colors.length]}"></div>
                        <span>${Utils.escapeHtml(d.label)}: ${d.value}</span>
                    </div>
                `).join('');
            }
        };

        // ==================== 앱 메인 ====================
        const App = {
            currentPage: 'dashboard',
            _weekOffset: 0,
            _calOffset: 0,

            changeWeekOffset(delta) {
                this._weekOffset += delta;
                this.navigate('dashboard');
            },

            changeCalOffset(delta) {
                this._calOffset += delta;
                this.navigate('dashboard');
            },

            async init() {
                
                if (Auth.init()) {
                    this.showApp();
                } else {
                    this.showAuth();
                }

                this.bindEvents();
            },

            showAuth() {
                document.getElementById('authScreen').classList.remove('hidden');
                document.getElementById('appScreen').classList.add('hidden');
                document.getElementById('syncBtn').style.display = 'none';
                stopAutoRefresh();
            },

            showApp() {
                document.getElementById('authScreen').classList.add('hidden');
                document.getElementById('appScreen').classList.remove('hidden');
                document.getElementById('syncBtn').style.display = 'inline-block';

                // Sheets 연결 상태 배너
                const existBanner = document.getElementById('_sheetsBanner');
                if (existBanner) existBanner.remove();
                if (DataStore._sheetsOK === false) {
                    const banner = document.createElement('div');
                    banner.id = '_sheetsBanner';
                    banner.style.cssText = 'background:#fff3e0;color:#e65100;padding:8px 16px;font-size:13px;text-align:center;border-bottom:1px solid #ffcc80;';
                    banner.innerHTML = '⚠️ Google Sheets 연결 실패 — 로컬 데이터로 동작 중입니다. Apps Script 재배포 후 🔄 새로고침을 눌러주세요.';
                    document.getElementById('appScreen').prepend(banner);
                }
                
                // 관리자 메뉴 표시
                document.querySelectorAll('.admin-only').forEach(el => {
                    el.classList.toggle('hidden', !Auth.isAdmin());
                });

                // 사용자 정보
                document.getElementById('userInfo').textContent = 
                    `${Auth.currentUser.name} (${Auth.isAdmin() ? '관리자' : '직원'})`;

                this.navigate('dashboard');
                startAutoRefresh();
            },

            navigate(page) {
                
                // 네비게이션 활성화
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.classList.toggle('active', btn.dataset.page === page);
                });

                // 페이지 렌더링
                const content = document.getElementById('mainContent');
                if (Pages[page]) {
                    content.innerHTML = Pages[page]();
                    this.bindPageEvents(page);
                }
            },

            bindEvents() {
                // 탭 전환
                document.querySelectorAll('.tab-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                        btn.classList.add('active');
                        
                        const tab = btn.dataset.tab;
                        document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
                        document.getElementById('signupForm').classList.toggle('hidden', tab !== 'signup');
                    });
                });

                // 로그인
                document.getElementById('loginForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('loginName').value.trim();
                    const pw = document.getElementById('loginPw').value;
                    
                    const result = Auth.login(name, pw);
                    if (result.success) {
                        this.showApp();
                    } else {
                        const error = document.getElementById('loginError');
                        error.textContent = result.error;
                        error.classList.remove('hidden');
                    }
                });

                // 회원가입
                document.getElementById('signupForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const name = document.getElementById('signupName').value.trim();
                    const empNo = document.getElementById('signupEmpNo').value.trim();
                    const worksite = document.getElementById('signupWorksite').value.trim();
                    const dept = document.getElementById('signupDept').value.trim();
                    const pw = document.getElementById('signupPw').value;
                    const pwConfirm = document.getElementById('signupPwConfirm').value;
                    
                    const error = document.getElementById('signupError');
                    const success = document.getElementById('signupSuccess');
                    error.classList.add('hidden');
                    success.classList.add('hidden');

                    if (pw !== pwConfirm) {
                        error.textContent = '비밀번호가 일치하지 않습니다.';
                        error.classList.remove('hidden');
                        return;
                    }

                    const result = Auth.signup(name, pw, empNo, worksite, dept);
                    if (result.success) {
                        success.textContent = '가입 신청이 완료되었습니다. 관리자 승인 후 이용 가능합니다.';
                        success.classList.remove('hidden');
                        document.getElementById('signupForm').reset();
                    } else {
                        error.textContent = result.error;
                        error.classList.remove('hidden');
                    }
                });

                // 로그아웃
                document.getElementById('logoutBtn').addEventListener('click', () => {
                    Auth.logout();
                    this.showAuth();
                });

                // 비밀번호 변경
                document.getElementById('changePwBtn').addEventListener('click', () => {
                    const modal = Components.showModal('비밀번호 변경', `
                        <form id="changePwForm">
                            <div class="form-group">
                                <label>현재 비밀번호</label>
                                <input type="password" id="currentPw" class="form-control" maxlength="4" required>
                            </div>
                            <div class="form-group">
                                <label>새 비밀번호</label>
                                <input type="password" id="newPw" class="form-control" maxlength="4" required>
                            </div>
                            <div class="form-group">
                                <label>새 비밀번호 확인</label>
                                <input type="password" id="newPwConfirm" class="form-control" maxlength="4" required>
                            </div>
                            <p id="changePwError" class="text-danger hidden"></p>
                            <button type="submit" class="btn btn-primary">변경</button>
                        </form>
                    `);

                    modal.querySelector('#changePwForm').addEventListener('submit', (e) => {
                        e.preventDefault();
                        const current = modal.querySelector('#currentPw').value;
                        const newPw = modal.querySelector('#newPw').value;
                        const confirm = modal.querySelector('#newPwConfirm').value;
                        const error = modal.querySelector('#changePwError');

                        if (newPw !== confirm) {
                            error.textContent = '새 비밀번호가 일치하지 않습니다.';
                            error.classList.remove('hidden');
                            return;
                        }

                        const result = Auth.changePassword(current, newPw);
                        if (result.success) {
                            Components.alert('비밀번호가 변경되었습니다.');
                            modal.remove();
                        } else {
                            error.textContent = result.error;
                            error.classList.remove('hidden');
                        }
                    });
                });

                // 네비게이션
                document.querySelectorAll('.nav-btn').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.navigate(btn.dataset.page);
                    });
                });
            },

            bindPageEvents(page) {
                switch (page) {
                    case 'tasks':
                        this.bindTaskEvents();
                        break;
                    case 'vacation':
                        this.bindVacationEvents();
                        break;
                    case 'handover':
                        this.bindHandoverEvents();
                        break;
                    case 'issues':
                        this.bindIssueEvents();
                        break;
                    case 'analysis':
                        this.renderAnalysisCharts();
                        this.bindAnalysisEvents();
                        break;
                }
            },

            bindTaskEvents() {
                document.getElementById('taskForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const data = DataStore.getData();
                    
                    const task = {
                        id: Utils.generateId(),
                        date: document.getElementById('taskDate').value,
                        content: document.getElementById('taskContent').value.trim(),
                        priority: document.getElementById('taskPriority').value,
                        duration: parseFloat(document.getElementById('taskDuration').value),
                        status: 'progress',
                        createdBy: Auth.currentUser.name,
                        assignee: document.getElementById('taskAssignee')?.value || '',
                        createdAt: new Date().toISOString()
                    };

                    data.tasks.push(task);
                    DataStore.saveData(data);
                    this.navigate('tasks');
                });

                // 필터
                document.getElementById('filterStatus').addEventListener('change', () => this.filterTasks());
                document.getElementById('filterMonth').addEventListener('change', () => this.filterTasks());
            },

            filterTasks() {
                const status = document.getElementById('filterStatus').value;
                const month = document.getElementById('filterMonth').value;
                
                document.querySelectorAll('#taskTable tbody tr').forEach(row => {
                    const rowStatus = row.dataset.status;
                    const rowDate = row.dataset.date;
                    
                    const statusMatch = !status || rowStatus === status;
                    const monthMatch = !month || rowDate.startsWith(month);
                    
                    row.style.display = statusMatch && monthMatch ? '' : 'none';
                });
            },

            completeTask(id) {
                const data = DataStore.getData();
                const task = data.tasks.find(t => t.id === id);
                if (!task) return;
                if (!Auth.isAdmin() && (task.assignee || task.createdBy) !== Auth.currentUser.name) {
                    Components.alert('본인의 업무만 수정할 수 있습니다.'); return;
                }
                task.status = 'done';
                task.completedAt = new Date().toISOString();
                DataStore.saveData(data);
                this.navigate('tasks');
            },

            reopenTask(id) {
                const data = DataStore.getData();
                const task = data.tasks.find(t => t.id === id);
                if (!task) return;
                if (!Auth.isAdmin() && (task.assignee || task.createdBy) !== Auth.currentUser.name) {
                    Components.alert('본인의 업무만 수정할 수 있습니다.'); return;
                }
                task.status = 'progress';
                delete task.completedAt;
                DataStore.saveData(data);
                this.navigate('tasks');
            },

            deleteTask(id) {
                if (!Components.confirm('정말 삭제하시겠습니까?')) return;
                const data = DataStore.getData();
                const task = data.tasks.find(t => t.id === id);
                if (!task) return;
                if (!Auth.isAdmin() && (task.assignee || task.createdBy) !== Auth.currentUser.name) {
                    Components.alert('본인의 업무만 삭제할 수 있습니다.'); return;
                }
                data.tasks = data.tasks.filter(t => t.id !== id);
                DataStore.saveData(data);
                this.navigate('tasks');
            },

            bindVacationEvents() {
                const typeSelect = document.getElementById('vacationType');
                const endGroup = document.getElementById('vacationEndGroup');

                typeSelect.addEventListener('change', () => {
                    const type = typeSelect.value;
                    endGroup.style.display = (type === '연차' || type === '경조사') ? 'block' : 'none';
                });

                document.getElementById('vacationForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const data = DataStore.getData();
                    const reqName = document.getElementById('vacationName')?.value || Auth.currentUser.name;
                    if (!Auth.isAdmin() && reqName !== Auth.currentUser.name) {
                        Components.alert('본인의 휴가만 등록할 수 있습니다.'); return;
                    }
                    const type = document.getElementById('vacationType').value;
                    const start = document.getElementById('vacationStart').value;
                    const end = document.getElementById('vacationEnd').value;
                    let dates = [start];
                    if ((type === '연차' || type === '경조사') && end && end >= start) {
                        dates = Utils.getDateRange(start, end);
                    }
                    const vacation = {
                        id: Utils.generateId(),
                        name: reqName, type, dates,
                        memo: document.getElementById('vacationMemo').value.trim(),
                        createdAt: new Date().toISOString()
                    };
                    data.vacations.push(vacation);
                    DataStore.saveData(data);
                    this.navigate('vacation');
                });
            },

            deleteVacation(id) {
                if (!Components.confirm('정말 삭제하시겠습니까?')) return;
                const data = DataStore.getData();
                const vac = data.vacations.find(v => v.id === id);
                if (!vac) return;
                if (!Auth.isAdmin() && vac.name !== Auth.currentUser.name) {
                    Components.alert('본인의 휴가만 삭제할 수 있습니다.'); return;
                }
                data.vacations = data.vacations.filter(v => v.id !== id);
                DataStore.saveData(data);
                this.navigate('vacation');
            },

            bindHandoverEvents() {
                document.getElementById('handoverForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const data = DataStore.getData();
                    const fromVal = document.getElementById('handoverFrom').value;
                    if (!Auth.isAdmin() && fromVal !== Auth.currentUser.name) {
                        Components.alert('본인의 인수인계만 등록할 수 있습니다.'); return;
                    }
                    const handover = {
                        id: Utils.generateId(),
                        from: fromVal,
                        to: document.getElementById('handoverTo').value,
                        date: document.getElementById('handoverDate').value,
                        content: document.getElementById('handoverContent').value.trim(),
                        createdAt: new Date().toISOString()
                    };

                    data.handovers.push(handover);
                    DataStore.saveData(data);
                    this.navigate('handover');
                });

                // 전체 선택
                document.getElementById('selectAllHandover').addEventListener('change', (e) => {
                    document.querySelectorAll('.handover-check').forEach(cb => {
                        cb.checked = e.target.checked;
                    });
                });
            },

            editHandover(id) {
                const data = DataStore.getData();
                const h = data.handovers.find(h => h.id === id);
                if (!h) return;
                if (!Auth.isAdmin() && String(h.from||'').trim() !== String(Auth.currentUser.name||'').trim()) {
                    Components.alert('본인의 인수인계만 수정할 수 있습니다.'); return;
                }

                const members = DataStore.getMembers().filter(m => m.status === 'approved');
                const toOptions = members.map(m =>
                    `<option value="${Utils.escapeHtml(m.name)}" ${m.name === h.to ? 'selected' : ''}>${Utils.escapeHtml(m.name)}</option>`
                ).join('');

                const modal = Components.showModal('📝 인수인계 수정', `
                    <div class="form-group">
                        <label>인계일</label>
                        <input type="date" id="editHandoverDate" class="form-control" value="${h.date ? h.date.substring(0,10) : ''}">
                    </div>
                    <div class="form-group">
                        <label>인수자</label>
                        <select id="editHandoverTo" class="form-control">${toOptions}</select>
                    </div>
                    <div class="form-group">
                        <label>인계 업무</label>
                        <textarea id="editHandoverContent" class="form-control" rows="6" style="resize:vertical">${Utils.escapeHtml(h.content)}</textarea>
                    </div>
                    <p id="editHandoverError" class="text-danger hidden"></p>
                    <div class="btn-group">
                        <button class="btn btn-primary" onclick="App.saveHandoverEdit('${id}')">저장</button>
                        <button class="btn btn-secondary" onclick="document.querySelector('.modal-backdrop')?.remove()">취소</button>
                    </div>
                `);
            },

            saveHandoverEdit(id) {
                const data = DataStore.getData();
                const h = data.handovers.find(h => h.id === id);
                if (!h) return;

                const date = document.getElementById('editHandoverDate').value;
                const to = document.getElementById('editHandoverTo').value;
                const content = document.getElementById('editHandoverContent').value.trim();

                if (!date) { document.getElementById('editHandoverError').textContent = '인계일을 입력하세요.'; document.getElementById('editHandoverError').classList.remove('hidden'); return; }
                if (!content) { document.getElementById('editHandoverError').textContent = '내용을 입력하세요.'; document.getElementById('editHandoverError').classList.remove('hidden'); return; }

                h.date = date;
                h.to = to;
                h.content = content;
                h.updatedAt = new Date().toISOString();

                DataStore.saveData(data);
                document.querySelector('.modal-backdrop')?.remove();
                this.navigate('handover');
            },

            deleteHandover(id) {
                if (!Components.confirm('정말 삭제하시겠습니까?')) return;
                const data = DataStore.getData();
                const h = data.handovers.find(h => h.id === id);
                if (!h) return;
                if (!Auth.isAdmin() && String(h.from||'').trim() !== String(Auth.currentUser.name||'').trim()) {
                    Components.alert('본인의 인수인계만 삭제할 수 있습니다.'); return;
                }
                data.handovers = data.handovers.filter(h => h.id !== id);
                DataStore.saveData(data);
                this.navigate('handover');
            },

            printHandovers() {
                const selected = Array.from(document.querySelectorAll('.handover-check:checked')).map(cb => cb.value);
                if (selected.length === 0) {
                    Components.alert('인쇄할 항목을 선택해주세요.');
                    return;
                }

                const data = DataStore.getData();
                const handovers = data.handovers.filter(h => selected.includes(h.id));
                const fromName = handovers.length > 0 ? handovers[0].from : Auth.currentUser.name;

                const html = `<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>업무 인수인계서</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'맑은 고딕','Malgun Gothic','Apple SD Gothic Neo',sans-serif; font-size:12px; padding:15mm 18mm; }
  .top-row { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:12px; }
  .title-box { padding-top:4px; }
  .title { font-size:25px; font-weight:bold; white-space:nowrap; }
  .date  { font-size:11px; color:#333; margin-top:5px; }
  .sign-table { border-collapse:collapse; table-layout:fixed; }
  .sign-table td, .sign-table th { border:1px solid #000; text-align:center; font-size:10px; padding:0; overflow:hidden; }
  .sign-col0 { width:18px; font-size:11px; font-weight:bold; writing-mode:vertical-lr; text-orientation:upright; vertical-align:middle; height:66px; }
  .sign-col  { width:60px; }
  .sign-head { padding:3px 0; font-weight:600; }
  .sign-body { height:46px; }
  .from-row  { font-size:12px; margin-bottom:8px; }
  .main-table { width:100%; border-collapse:collapse; table-layout:fixed; }
  .main-table th, .main-table td { border:1px solid #000; padding:6px 5px; font-size:11px; vertical-align:top; }
  .main-table th { background:#f0f0f0; text-align:center; font-weight:600; white-space:nowrap; }
  .col-date    { width:88px; text-align:center; white-space:nowrap; }
  .col-to      { width:80px; text-align:center; white-space:nowrap; }
  .col-content { word-break:break-all; white-space:pre-wrap; }
  .col-note    { width:70px; }
</style>
</head>
<body>
  <div class="top-row">
    <div class="title-box">
      <div class="title">업무 인수인계서</div>
      <div class="date">출력일 : ${Utils.today()}</div>
    </div>
    <table class="sign-table">
      <tr>
        <td class="sign-col0" rowspan="2">결재</td>
        <th class="sign-col sign-head">담당</th>
        <th class="sign-col sign-head">파트장</th>
        <th class="sign-col sign-head">팀장</th>
        <th class="sign-col sign-head">부문장</th>
        <th class="sign-col sign-head">사업부장</th>
      </tr>
      <tr>
        <td class="sign-col sign-body"></td>
        <td class="sign-col sign-body"></td>
        <td class="sign-col sign-body"></td>
        <td class="sign-col sign-body"></td>
        <td class="sign-col sign-body"></td>
      </tr>
    </table>
  </div>
  <div class="from-row">출력자(인계자) : ${Utils.escapeHtml(fromName)}</div>
  <table class="main-table">
    <thead>
      <tr>
        <th class="col-date">인계일</th>
        <th class="col-to">인수자</th>
        <th class="col-content">내용</th>
        <th class="col-note">비고</th>
      </tr>
    </thead>
    <tbody>
      ${handovers.map(h => `
      <tr>
        <td class="col-date">${h.date ? Utils.formatDateKr(h.date) : ''}</td>
        <td class="col-to">${Utils.escapeHtml(h.to)}</td>
        <td class="col-content">${Utils.escapeHtml(h.content)}</td>
        <td class="col-note"></td>
      </tr>`).join('')}
    </tbody>
  </table>
</body>
</html>`;

                const w = window.open('', '_blank', 'width=800,height=600');
                if (!w) { Components.alert('팝업이 차단되었습니다. 팝업을 허용해 주세요.'); return; }
                w.document.open();
                w.document.write(html);
                w.document.close();
                w.focus();
                setTimeout(() => w.print(), 500);
            },

            bindIssueEvents() {
                document.getElementById('issueForm').addEventListener('submit', (e) => {
                    e.preventDefault();
                    const data = DataStore.getData();
                    
                    const issue = {
                        id: Utils.generateId(),
                        title: document.getElementById('issueTitle').value.trim(),
                        content: document.getElementById('issueContent').value.trim(),
                        urgent: document.getElementById('issueUrgent').value === 'true',
                        active: true,
                        createdBy: Auth.currentUser.name,
                        createdAt: new Date().toISOString()
                    };

                    data.issues.push(issue);
                    DataStore.saveData(data);
                    this.navigate('issues');
                });
            },

            closeIssue(id) {
                const data = DataStore.getData();
                const issue = data.issues.find(i => i.id === id);
                if (issue) {
                    issue.active = false;
                    DataStore.saveData(data);
                    this.navigate('issues');
                }
            },

            reopenIssue(id) {
                const data = DataStore.getData();
                const issue = data.issues.find(i => i.id === id);
                if (issue) {
                    issue.active = true;
                    DataStore.saveData(data);
                    this.navigate('issues');
                }
            },

            deleteIssue(id) {
                if (!Components.confirm('정말 삭제하시겠습니까?')) return;
                const data = DataStore.getData();
                data.issues = data.issues.filter(i => i.id !== id);
                DataStore.saveData(data);
                this.navigate('issues');
            },

            renderAnalysisCharts() {
                const data = DataStore.getData();
                const members = DataStore.getMembers().filter(m => m.status === 'approved' && m.role !== 'admin');
                const month = document.getElementById('analysisMonth')?.value || Utils.today().substring(0, 7);

                const monthTasks = data.tasks.filter(t => 
                    t.date.startsWith(month) && t.status === 'done'
                );

                const hoursData = [];
                const countData = [];
                const colors = ['#3498db', '#e74c3c', '#2ecc71', '#f39c12', '#9b59b6', '#1abc9c', '#34495e'];

                members.forEach(m => {
                    const myTasks = monthTasks.filter(t => 
                        t.assignee === m.name || (!t.assignee && t.createdBy === m.name)
                    );
                    const hours = myTasks.reduce((sum, t) => sum + (t.duration || 0), 0);
                    hoursData.push({ label: m.name, value: hours });
                    countData.push({ label: m.name, value: myTasks.length });
                });

                setTimeout(() => {
                    Charts.drawDonut('hoursChart', 'hoursLegend', hoursData, colors);
                    Charts.drawDonut('countChart', 'countLegend', countData, colors);
                }, 0);
            },

            bindAnalysisEvents() {
                document.getElementById('analysisMonth')?.addEventListener('change', () => {
                    this.navigate('analysis');
                });
            },

            approveMember(id) {
                const members = DataStore.getMembers();
                const member = members.find(m => m.id === id);
                if (member) {
                    member.status = 'approved';
                    DataStore.saveMembers(members);
                    this.navigate('members');
                }
            },

            rejectMember(id) {
                const members = DataStore.getMembers();
                const member = members.find(m => m.id === id);
                if (member) {
                    member.status = 'rejected';
                    DataStore.saveMembers(members);
                    this.navigate('members');
                }
            },

            deleteMember(id) {
                if (!Components.confirm('정말 삭제하시겠습니까?')) return;
                let members = DataStore.getMembers();
                members = members.filter(m => m.id !== id);
                DataStore.saveMembers(members);
                this.navigate('members');
            },

            // 소요시간 수정
            updateDuration(id, value) {
                const data = DataStore.getData();
                const task = data.tasks.find(t => t.id === id);
                if (!task) return;
                if (!Auth.isAdmin() && (task.assignee||task.createdBy) !== Auth.currentUser.name) {
                    Components.alert('본인의 업무만 수정할 수 있습니다.'); return;
                }
                task.duration = parseFloat(value);
                DataStore.saveData(data);
            },

            // 권한 변경 (관리자 → 직원 / 직원 → 관리자)
            changeRole(id, newRole) {
                if (!Auth.isAdmin()) return;
                if (id === Auth.currentUser.id) {
                    Components.alert('자신의 권한은 변경할 수 없습니다.');
                    this.navigate('members');
                    return;
                }
                const members = DataStore.getMembers();
                const member = members.find(m => m.id === id);
                if (!member) return;
                member.role = newRole;
                DataStore.saveMembers(members);
                // 현재 로그인 중인 사용자의 권한이 바뀐 경우 세션 동기화
                if (Auth.currentUser && Auth.currentUser.id === id) {
                    Auth.currentUser.role = newRole;
                    document.querySelectorAll('.admin-only').forEach(el => el.classList.toggle('hidden', !Auth.isAdmin()));
                    document.getElementById('userInfo').textContent = `${Auth.currentUser.name} (${Auth.isAdmin()?'관리자':'직원'})`;
                }
                this.navigate('members');
            },

            // 달력 휴가자 이름 클릭 → 인수인계 모달
            showHandoverModal(name, date) {
                const data = DataStore.getData();
                const allByPerson = data.handovers.filter(h => h.from === name).sort((a,b) => b.date.localeCompare(a.date));
                const isSelf = Auth.currentUser.name === name || Auth.isAdmin();

                let content = `<p style="margin-bottom:.75rem;color:var(--gray-600);font-size:.9rem">
                    <strong>${Utils.escapeHtml(name)}</strong> · 인수인계 내역
                    ${isSelf ? '' : '<span style="background:#fff3e0;color:#e65100;font-size:.75rem;padding:2px 8px;border-radius:999px;margin-left:6px">👁 조회만 가능</span>'}
                </p>`;

                if (allByPerson.length === 0) {
                    content += `<p style="color:#999;text-align:center;padding:1rem">등록된 인수인계가 없습니다.</p>`;
                    if (isSelf) {
                        content += `<button class="btn btn-primary btn-sm" onclick="App.goToHandoverWithDate('${date}');document.querySelector('.modal-backdrop')?.remove()">+ 인수인계 작성하기</button>`;
                    }
                } else {
                    content += allByPerson.slice(0,10).map(h => `
                        <div class="handover-modal-item">
                            <div style="display:flex;justify-content:space-between;margin-bottom:4px">
                                <strong>${h.date ? Utils.formatDateKr(h.date) : ''}</strong>
                                <span style="color:var(--gray-600);font-size:.8rem">→ ${Utils.escapeHtml(h.to)}</span>
                            </div>
                            <div style="white-space:pre-wrap">${Utils.escapeHtml(h.content)}</div>
                        </div>`).join('');
                    if (isSelf) {
                        content += `<div style="margin-top:.75rem">
                            <button class="btn btn-primary btn-sm" onclick="App.goToHandoverWithDate('${date}');document.querySelector('.modal-backdrop')?.remove()">+ 인수인계 추가 작성</button>
                        </div>`;
                    }
                }
                Components.showModal(`📋 ${Utils.escapeHtml(name)} 인수인계`, content);
            },

            // 휴가 날짜 클릭 → 인수인계 페이지로 이동 + 날짜 자동 입력
            goToHandoverWithDate(date) {
                this.navigate('handover');
                setTimeout(() => {
                    const dateInput = document.getElementById('handoverDate');
                    if (dateInput) dateInput.value = date;
                }, 50);
            }
        };

        // 앱 시작
        document.addEventListener('DOMContentLoaded', () => App.init());

        // ==================== 자동 새로고침 (30초) ====================
        let _autoRefreshTimer = null;

        function startAutoRefresh() {
            stopAutoRefresh();
            _autoRefreshTimer = setInterval(() => {
                // 로그인 상태이고 페이지가 활성화된 경우에만 실행
                if (Auth.currentUser && !document.hidden) {
                    DataStore.silentRefresh();
                }
            }, 300000); // 5분
        }

        function stopAutoRefresh() {
            if (_autoRefreshTimer) {
                clearInterval(_autoRefreshTimer);
                _autoRefreshTimer = null;
            }
        }

        // 탭이 다시 활성화될 때 즉시 새로고침
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && Auth.currentUser) {
                DataStore.silentRefresh();
            }
        });

        // ==================== PWA ====================
        // 서비스 워커 등록
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/tjeorb/sw.js')
                    .then(() => console.log('SW 등록 완료'))
                    .catch(err => console.warn('SW 등록 실패:', err));
            });
        }

        // 앱 설치 프롬프트
        let _pwaPrompt = null;

        function _showInstallBtns(show) {
            const box = document.getElementById('pwaInstallBox');
            const hBtn = document.getElementById('headerInstallBtn');
            if (box) box.style.display = show ? 'block' : 'none';
            if (hBtn) hBtn.style.display = show ? 'inline-block' : 'none';
        }

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            _pwaPrompt = e;
            _showInstallBtns(true);
        });

        // 로그인 화면 설치 버튼
        document.getElementById('pwaInstallBtn')?.addEventListener('click', async () => {
            if (!_pwaPrompt) return;
            _pwaPrompt.prompt();
            const { outcome } = await _pwaPrompt.userChoice;
            if (outcome === 'accepted') {
                _showInstallBtns(false);
                _pwaPrompt = null;
            }
        });

        // App에 헤더 버튼용 함수 추가
        App.promptInstall = async function() {
            if (!_pwaPrompt) return;
            _pwaPrompt.prompt();
            const { outcome } = await _pwaPrompt.userChoice;
            if (outcome === 'accepted') {
                _showInstallBtns(false);
                _pwaPrompt = null;
            }
        };

        // 설치 완료 시 버튼 숨기기
        window.addEventListener('appinstalled', () => {
            _showInstallBtns(false);
            _pwaPrompt = null;
            console.log('앱 설치 완료');
        });
    </script>
</body>
</html>
